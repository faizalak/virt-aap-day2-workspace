- name: Setup Local Repo and Patch Disconnected VM
  hosts: all
  become: true
  tasks:
    # 1. Disable all default repositories (ensures a clean slate)
    - name: Disable all default repositories
      shell: dnf config-manager --set-disabled "*"
      ignore_errors: true # Keep ignore_errors, but be aware of potential failures

    # 2. Create Local Repo File pointing to Bastion
    - name: Create Local Repo Configuration File
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/local-mirror.repo
        content: |
          [local-baseos]
          name=RHEL 9 BaseOS - Local Mirror
          baseurl=http://192.168.2.100/repos/rhel-9-for-x86_64-baseos-rpms
          enabled=1
          gpgcheck=0

          [local-appstream]
          name=RHEL 9 AppStream - Local Mirror
          baseurl=http://192.168.2.100/repos/rhel-9-for-x86_64-appstream-rpms
          enabled=1
          gpgcheck=0
      register: copy_result

    # 3. Verify the repository file content (Optional but helpful)
    - name: Display created repository file content
      ansible.builtin.debug:
        var: copy_result.dest

    # 4. List DNF repositories before and after configuration (for verification)
    - name: List DNF repositories (Before config)
      ansible.builtin.command: dnf repolist
      register: dnf_repo_output
      changed_when: false

    - name: Display results
      ansible.builtin.debug:
        msg: "--- Repo Configuration --- \n{{ dnf_repo_output.stdout }}"
      when: dnf_repo_output.stdout

    # 6. Clean DNF cache (Final cleanup)
    - name: Clean DNF cache
      ansible.builtin.dnf:
        update_cache: yes
